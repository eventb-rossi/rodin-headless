name: Docker

# The image is large (~1.3 GB; downloads ~300 MB of Rodin + ProB), so it is
# not built on every PR — only when container-relevant files change, on demand,
# and weekly. The weekly run is the canary for upstream drift: the floating apt
# packages, the eclipse-temurin base image, and the version scraping in
# rodin-version.sh / prob-version.sh (RODIN_VERSION / PROB_VERSION default to
# "latest", so the build exercises both resolvers end to end).
on:
  push:
    branches: [main]
    paths: [Dockerfile, .dockerignore, "*.sh"]
  pull_request:
    paths: [Dockerfile, .dockerignore, "*.sh"]
  schedule:
    - cron: "0 6 * * 1"        # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: rodin-headless:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the image
        run: docker run --rm rodin-headless:ci help
