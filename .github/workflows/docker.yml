name: Docker

# The image is large (~1.3 GB; downloads ~300 MB of Rodin + ProB), so it is
# not built on every PR — only when container-relevant files change, on demand,
# weekly, and on release. The weekly run is the canary for upstream drift: the
# floating apt packages, the eclipse-temurin base image, and the version
# scraping in rodin-version.sh / prob-version.sh (RODIN_VERSION / PROB_VERSION
# default to "latest", so the build exercises both resolvers end to end).
#
# Every non-PR event also publishes to ghcr.io/<owner>/rodin-headless using the
# built-in GITHUB_TOKEN — no extra secrets. PRs only build + smoke-test (a
# fork PR has no push token). Releases trigger via the `release` event rather
# than `push.tags` so the `paths` filter below cannot suppress a tag build.
on:
  push:
    branches: [main]
    paths: [Dockerfile, .dockerignore, "*.sh"]
  pull_request:
    paths: [Dockerfile, .dockerignore, "*.sh"]
  release:
    types: [published]
  schedule:
    - cron: "0 6 * * 1"        # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # push to GHCR with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # latest=false: the only `latest` source is the explicit rule below
          # (default branch only). Otherwise metadata-action's default
          # latest=auto would also move `latest` onto release/semver tags,
          # pinning default `rodin` users to a release instead of main+weekly.
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=sha,format=short

      # Build once and load locally so the smoke test runs against the exact
      # image that gets published. platforms pins the documented amd64-only
      # contract (Rodin/ProB ship only x86_64 Linux binaries); labels are baked
      # in here so the tag+push below carries them without a second build.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: rodin-headless:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: docker run --rm rodin-headless:ci help

      # Publish on every non-PR event by tagging and pushing the image the
      # smoke test just exercised — no second buildx run, no re-import of the
      # ~1.3 GB image from cache. The result is a plain single-arch manifest
      # (no attestation index) whose bytes are provably the tested ones.
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            [ -n "$tag" ] || continue
            docker tag rodin-headless:ci "$tag"
            docker push "$tag"
          done
